name: Publish NuGet

on:
  push:
    tags:
      - 'KoreForge.Web/v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Pack & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore local tools
        run: dotnet tool restore

      - name: Build
        run: dotnet build KoreForge.Web.slnx -c Release

      - name: Test
        run: dotnet test KoreForge.Web.slnx -c Release --no-build

      - name: Pack
        run: |
          dotnet pack src/KF.Web.Authorization/KF.Web.Authorization.csproj -c Release --no-build -o artifacts/
          dotnet pack src/KF.RestApi.Common.Abstractions/KF.RestApi.Common.Abstractions.csproj -c Release --no-build -o artifacts/
          dotnet pack src/KF.RestApi.Common.Observability/KF.RestApi.Common.Observability.csproj -c Release --no-build -o artifacts/
          dotnet pack src/KF.RestApi.Common.Persistence/KF.RestApi.Common.Persistence.csproj -c Release --no-build -o artifacts/
          dotnet pack src/KF.Web.HealthChecks/KF.Web.HealthChecks.csproj -c Release --no-build -o artifacts/

      - name: Push to NuGet.org
        run: |
          dotnet nuget push artifacts/*.nupkg \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.nupkg
          generate_release_notes: true
