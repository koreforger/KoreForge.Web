name: Publish NuGet

on:
  push:
    tags:
      - 'KoreForge.Web/v*'

jobs:
  publish:
    name: Pack & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # MinVer needs full history to compute version

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore local tools
        run: dotnet tool restore

      - name: Build
        run: dotnet build KoreForge.Web.sln -c Release

      - name: Test
        run: dotnet test KoreForge.Web.sln -c Release --no-build

      - name: Pack
        run: |
          dotnet pack src/KF.RestApi.Common.Abstractions/KF.RestApi.Common.Abstractions.csproj -c Release --no-build --output artifacts/
          dotnet pack src/KF.RestApi.Common.Observability/KF.RestApi.Common.Observability.csproj -c Release --no-build --output artifacts/
          dotnet pack src/KF.RestApi.Common.Persistence/KF.RestApi.Common.Persistence.csproj -c Release --no-build --output artifacts/

      - name: Push to NuGet
        run: |
          dotnet nuget push artifacts/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
